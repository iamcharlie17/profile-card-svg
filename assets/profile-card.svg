  <line x1="455" y1="202" x2="455" y2="345" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- Detail rows -->
  <text x="470" y="220" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00d4ff" fill-opacity="0.5" letter-spacing="1.5">UNIVERSITY</text>
  <text x="470" y="233" font-family="'JetBrains Mono', monospace" font-size="10" fill="#cbd5e1">Islamic Univ. of Technology</text>

  <text x="470" y="252" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00d4ff" fill-opacity="0.5" letter-spacing="1.5">FOCUS</text>
  <text x="470" y="265" font-family="'JetBrains Mono', monospace" font-size="10" fill="#cbd5e1">Full-Stack · UI/UX · DSA</text>

  <text x="470" y="284" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00d4ff" fill-opacity="0.5" letter-spacing="1.5">EMAIL</text>
  <text x="470" y="297" font-family="'JetBrains Mono', monospace" font-size="10" fill="#38bdf8">riyadhosen40@gmail.com</text>

  <text x="470" y="316" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00d4ff" fill-opacity="0.5" letter-spacing="1.5">PORTFOLIO</text>
  <text x="470" y="329" font-family="'JetBrains Mono', monospace" font-size="10" fill="#38bdf8">charlie-portfolio-17.netlify.app</text>

  <!-- ══ BOTTOM BAR ══ -->
  <line x1="36" y1="345" x2="664" y2="345" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- Status pill -->
  <circle cx="46" cy="358" r="4" fill="#22d35a">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="55" y="362" font-family="'JetBrains Mono', monospace" font-size="9" fill="#22d35a" letter-spacing="0.5">AVAILABLE FOR OPPORTUNITIES</text>

  <!-- Link tags right -->
  <rect x="490" y="350" width="52" height="16" rx="4" fill="#00d4ff" fill-opacity="0.05" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.2"/>
  <text x="516" y="361.5" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7dd3fc" text-anchor="middle">GitHub</text>

  <rect x="548" y="350" width="56" height="16" rx="4" fill="#00d4ff" fill-opacity="0.05" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.2"/>
  <text x="576" y="361.5" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7dd3fc" text-anchor="middle">LinkedIn</text>

  <rect x="610" y="350" width="54" height="16" rx="4" fill="#00d4ff" fill-opacity="0.05" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.2"/>
  <text x="637" y="361.5" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7dd3fc" text-anchor="middle">Portfolio</text>
