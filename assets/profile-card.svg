  <line x1="36" y1="192" x2="664" y2="192" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- ══ CODE BLOCK ══ -->
  <!-- Code block bg -->
  <rect x="36" y="202" width="390" height="82" rx="8" fill="#00d4ff" fill-opacity="0.03" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.1"/>
  <!-- Left accent bar -->
  <rect x="36" y="202" width="3" height="82" rx="1.5" fill="#00d4ff" fill-opacity="0.6"/>

  <!-- Code lines -->
  <!-- Line 1 -->
  <text x="50" y="222" font-family="'JetBrains Mono', monospace" font-size="11">
    <tspan fill="#00d4ff">const </tspan>
    <tspan fill="#38bdf8">stack </tspan>
    <tspan fill="#475569">= </tspan>
    <tspan fill="#7dd3fc">"Next.js + TypeScript"</tspan>
    <tspan fill="#00d4ff" opacity="1">
      <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>▋</tspan>
  </text>
  <!-- Line 2 -->
  <text x="50" y="242" font-family="'JetBrains Mono', monospace" font-size="11">
    <tspan fill="#00d4ff">const </tspan>
    <tspan fill="#38bdf8">learning </tspan>
    <tspan fill="#475569">= </tspan>
    <tspan fill="#a5b4fc">["App Router", "System Design"]</tspan>
  </text>
  <!-- Line 3 -->
  <text x="50" y="262" font-family="'JetBrains Mono', monospace" font-size="11">
    <tspan fill="#00d4ff">const </tspan>
    <tspan fill="#38bdf8">openTo </tspan>
    <tspan fill="#475569">= </tspan>
    <tspan fill="#a5b4fc">["Full-time", "Freelance", "OSS"]</tspan>
  </text>
  <!-- Line 4 -->
  <text x="50" y="277" font-family="'JetBrains Mono', monospace" font-size="11">
    <tspan fill="#00d4ff">const </tspan>
    <tspan fill="#38bdf8">philosophy </tspan>
    <tspan fill="#475569">= </tspan>
    <tspan fill="#7dd3fc">"Ship fast. Iterate faster."</tspan>
  </text>

  <!-- ══ TECH CHIPS ══ -->
  <!-- Row label -->
  <text x="36" y="302" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00d4ff" fill-opacity="0.5" letter-spacing="2">TECH STACK</text>

  <!-- Chip 1: TypeScript -->
  <rect x="36" y="310" width="83" height="20" rx="10" fill="#3178c6" fill-opacity="0.12" stroke="#3178c6" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="77.5" y="323.5" font-family="'JetBrains Mono', monospace" font-size="10" fill="#60a5fa" text-anchor="middle">TypeScript</text>

  <!-- Chip 2: Next.js -->
  <rect x="126" y="310" width="63" height="20" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.15"/>
