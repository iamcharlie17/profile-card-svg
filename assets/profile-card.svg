<svg width="700" height="380" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Spinning ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="40%" stop-color="#0ea5e9"/>
      <stop offset="70%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <!-- Card background gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020817"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020817"/>
    </linearGradient>

    <!-- Top bar scan gradient -->
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020817" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00d4ff"/>
      <stop offset="70%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#020817" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip for avatar circle -->
    <clipPath id="avatarClip">
      <circle cx="90" cy="130" r="46"/>
    </clipPath>

    <!-- Clip for card rounded rect -->
    <clipPath id="cardClip">
      <rect x="10" y="10" width="680" height="360" rx="18"/>
    </clipPath>

    <!-- Grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00d4ff" stroke-width="0.4" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Card background -->
  <rect x="10" y="10" width="680" height="360" rx="18" fill="url(#cardBg)" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Grid overlay -->
  <rect x="10" y="10" width="680" height="360" rx="18" fill="url(#grid)" clip-path="url(#cardClip)"/>

  <!-- Top scan bar -->
  <rect x="10" y="10" width="680" height="3" rx="1.5" fill="url(#topBar)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets -->
  <path d="M26 26 L26 14 L38 14" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M662 26 L662 14 L650 14" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M26 354 L26 366 L38 366" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M662 354 L662 366 L650 366" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Scanline sweep -->
  <rect x="10" y="10" width="680" height="60" rx="0" fill="url(#scanGrad)" opacity="0.6" clip-path="url(#cardClip)">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,340" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.03;0.03;0" keyTimes="0;0.1;0.9;1" dur="6s" repeatCount="indefinite"/>
  </rect>
  <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </linearGradient>

  <!-- ══ SPINNING RING ══ -->
  <g transform="translate(90,130)">
    <!-- Outer spinning ring -->
    <circle r="52" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="326" stroke-dashoffset="82" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner static ring -->
    <circle r="48" fill="#020817" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.15"/>
  </g>

  <!-- Avatar image -->
  <image href="./avatar.png" x="44" y="84" width="92" height="92" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
  <!-- <image href="https://avatars.githubusercontent.com/u/155253356?v=4" x="44" y="84" width="92" height="92" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/> -->

  <!-- Online dot -->
  <circle cx="124" cy="164" r="7" fill="#020817"/>
  <circle cx="124" cy="164" r="5.5" fill="#22d35a">
    <animate attributeName="r" values="5.5;7.5;5.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="124" cy="164" r="5.5" fill="#22d35a"/>

  <!-- ══ NAME & ROLE ══ -->
  <text x="158" y="102" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="22" font-weight="700" fill="#e0f2fe" letter-spacing="-0.5">Riyad Hosen</text>

  <!-- Alias badge -->
  <rect x="158" y="110" width="68" height="18" rx="5" fill="#00d4ff" fill-opacity="0.1" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="192" y="122.5" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00d4ff" text-anchor="middle" letter-spacing="1.5">CHARLIE</text>

  <!-- Role line -->
  <text x="158" y="145" font-family="'JetBrains Mono', monospace" font-size="11" fill="#7dd3fc" letter-spacing="0.3">MERN Stack Developer · Software Engineering Student</text>

  <!-- Meta badges -->
  <rect x="158" y="153" width="110" height="16" rx="8" fill="#0ea5e9" fill-opacity="0.08" stroke="#0ea5e9" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="213" y="164.5" font-family="'JetBrains Mono', monospace" font-size="9" fill="#38bdf8" text-anchor="middle">📍 Dhaka, Bangladesh</text>

  <rect x="276" y="153" width="60" height="16" rx="8" fill="#0ea5e9" fill-opacity="0.08" stroke="#0ea5e9" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="306" y="164.5" font-family="'JetBrains Mono', monospace" font-size="9" fill="#38bdf8" text-anchor="middle">🎓 IUT</text>

  <rect x="344" y="153" width="108" height="16" rx="8" fill="#22d35a" fill-opacity="0.08" stroke="#22d35a" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="398" y="164.5" font-family="'JetBrains Mono', monospace" font-size="9" fill="#4ade80" text-anchor="middle">🟢 Open to Work</text>

