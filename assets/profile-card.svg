  <rect x="196" y="310" width="55" height="20" rx="10" fill="#61dafb" fill-opacity="0.1" stroke="#61dafb" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="223.5" y="323.5" font-family="'JetBrains Mono', monospace" font-size="10" fill="#61dafb" text-anchor="middle">React</text>

  <!-- Chip 4: Node.js -->
  <rect x="258" y="310" width="63" height="20" rx="10" fill="#339933" fill-opacity="0.12" stroke="#339933" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="289.5" y="323.5" font-family="'JetBrains Mono', monospace" font-size="10" fill="#86efac" text-anchor="middle">Node.js</text>

  <!-- Chip 5: MongoDB -->
  <rect x="328" y="310" width="71" height="20" rx="10" fill="#47a248" fill-opacity="0.12" stroke="#47a248" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="363.5" y="323.5" font-family="'JetBrains Mono', monospace" font-size="10" fill="#4ade80" text-anchor="middle">MongoDB</text>

  <!-- Chip 6: Tailwind -->
  <rect x="406" y="310" width="66" height="20" rx="10" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.2"/>
  <text x="439" y="323.5" font-family="'JetBrains Mono', monospace" font-size="10" fill="#7dd3fc" text-anchor="middle">Tailwind</text>

